name: iOS Build & Deploy

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          ls /Applications/ | grep Xcode || true
          XCODE_PATH=$(ls -d /Applications/Xcode_15*.app /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            echo "Using $XCODE_PATH"
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          fi
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build for Simulator (verify compilation)
        run: |
          DEST='platform=iOS Simulator,name=iPhone 15,OS=latest'
          xcodebuild build \
            -project Introibo.xcodeproj \
            -scheme Introibo \
            -destination "$DEST" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -50

      - name: Deploy to TestFlight
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          echo "=== Secret diagnostic ==="
          echo "ASC_KEY_ID length:    ${#ASC_KEY_ID}"
          echo "ASC_ISSUER_ID length: ${#ASC_ISSUER_ID}"
          echo "APPLE_TEAM_ID length: ${#APPLE_TEAM_ID}"
          echo "ASC_KEY_P8 length:    ${#ASC_KEY_P8}"
          echo "ASC_KEY_P8 line count: $(echo "$ASC_KEY_P8" | wc -l)"
          echo "ASC_KEY_P8 first 30 chars: ${ASC_KEY_P8:0:30}"
          echo "ASC_KEY_P8 starts with BEGIN: $(echo "$ASC_KEY_P8" | grep -c 'BEGIN PRIVATE KEY')"
          echo "ASC_KEY_P8 ends with END:     $(echo "$ASC_KEY_P8" | grep -c 'END PRIVATE KEY')"
          echo ""
          echo "=== Validation ==="
          MISSING=0
          if [ -z "$ASC_KEY_ID" ]; then echo "❌ ASC_KEY_ID is empty"; MISSING=1; fi
          if [ -z "$ASC_ISSUER_ID" ]; then echo "❌ ASC_ISSUER_ID is empty"; MISSING=1; fi
          if [ -z "$ASC_KEY_P8" ]; then echo "❌ ASC_KEY_P8 is empty"; MISSING=1; fi
          if [ -z "$APPLE_TEAM_ID" ]; then echo "❌ APPLE_TEAM_ID is empty"; MISSING=1; fi
          if [ $MISSING -eq 1 ]; then
            echo ""
            echo "One or more secrets are missing. Go to:"
            echo "  github.com/HoldenCole/catholicapp/settings/secrets/actions"
            echo "Names must be EXACT (case-sensitive): ASC_KEY_ID, ASC_ISSUER_ID, ASC_KEY_P8, APPLE_TEAM_ID"
            exit 1
          fi
          echo "✅ All 4 secrets present"
          echo ""
          echo "=== Installing fastlane ==="
          gem install fastlane --no-document
          echo ""
          echo "=== Running fastlane beta ==="
          fastlane beta || (
            echo ""
            echo "=== fastlane build log (last 200 lines) ==="
            find ./fastlane-buildlog -name '*.log' -exec tail -200 {} \;
            exit 1
          )
