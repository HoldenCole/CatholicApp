name: iOS Build

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # List available and select latest
          ls /Applications/ | grep Xcode || true
          XCODE_PATH=$(ls -d /Applications/Xcode_15*.app /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            echo "Using $XCODE_PATH"
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          fi
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project AdAltareDei.xcodeproj \
            -scheme AdAltareDei

      - name: Build for iOS Simulator
        run: |
          # Try iPhone 15 first (more widely available), fall back to any iPhone
          DEST='platform=iOS Simulator,name=iPhone 15,OS=latest'
          xcodebuild build \
            -project AdAltareDei.xcodeproj \
            -scheme AdAltareDei \
            -destination "$DEST" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -100

      - name: Build Summary
        if: always()
        run: echo "Build completed for Ad Altare Dei"
