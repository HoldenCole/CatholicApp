name: iOS Build

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List Available Xcode Versions
        run: ls /Applications/ | grep Xcode

      - name: Select Xcode
        run: |
          # Use the latest available Xcode
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode found, using default"
          else
            echo "Using $XCODE_PATH"
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project AdAltareDei.xcodeproj \
            -scheme AdAltareDei

      - name: Build for iOS Simulator
        run: |
          # Find an available simulator
          DESTINATION='platform=iOS Simulator,name=iPhone 16,OS=latest'
          xcodebuild build \
            -project AdAltareDei.xcodeproj \
            -scheme AdAltareDei \
            -destination "$DESTINATION" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -50

      - name: Build Summary
        if: always()
        run: echo "Build completed for Ad Altare Dei"
